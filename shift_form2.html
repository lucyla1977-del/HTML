<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>טופס זמינות שבועי</title>
<style>
body{
margin:0;
padding:12px;
background:#0f172a;
color:white;
font-family:Arial,sans-serif;
}
.container{
max-width:700px;
margin:auto;
}
.header{
text-align:center;
margin-bottom:20px;
}
.card{
background:#1e293b;
border-radius:14px;
padding:16px;
margin-bottom:14px;
}
label{
display:block;
margin-bottom:8px;
}
input, textarea{
width:100%;
box-sizing:border-box;
padding:12px;
border-radius:10px;
border:none;
margin-top:8px;
background:#111827;
color:white;
font-size:16px;
outline:none;
}
textarea{
min-height:70px;
resize:vertical;
}
.day{
background:#111827;
border-radius:12px;
padding:12px;
margin-top:12px;
overflow-wrap:anywhere;
}
.day-title{
font-weight:bold;
margin-bottom:10px;
font-size:18px;
}
.day-date{
font-size:14px;
color:#94a3b8;
margin-bottom:10px;
}
.buttons{
display:flex;
gap:10px;
margin-bottom:10px;
flex-wrap:wrap;
}
.shift-btn{
flex:1 1 140px;
min-height:48px;
padding:14px;
border:none;
border-radius:10px;
background:#334155;
color:white;
font-size:15px;
cursor:pointer;
transition: background 0.2s;
-webkit-appearance: none;
appearance: none;
}
.shift-btn.active-morning{
background:#f59e0b;
color:black;
}
.shift-btn.active-evening{
background:#3b82f6;
color:white;
}
.submit-btn{
width:100%;
min-height:48px;
padding:16px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
font-size:18px;
margin-top:20px;
cursor:pointer;
-webkit-appearance: none;
appearance: none;
}
.result{
margin-top:20px;
background:#111827;
padding:12px;
border-radius:12px;
white-space:pre-wrap;
display:none;
overflow:auto;
}
</style>
</head>
<body>

<div class="container">
<div class="header">
<h1>טופס זמינות שבועי</h1>
<p>בחרו משמרות בלחיצה</p>
</div>

<div class="card">
<label for="employeeName">שם העובד</label>
<input id="employeeName" type="text" placeholder="השם שלך" autocomplete="name">
</div>

<div class="card">
<label for="weekStart">תחילת שבוע</label>
<input type="date" id="weekStart">
</div>

<div class="card" id="daysContainer"></div>

<button type="button" class="submit-btn" id="submitBtn">שלח זמינות</button>

<div class="result" id="result"></div>
</div>

<script>
(function init() {
  var days = ["ראשון","שני","שלישי","רביעי","חמישי","שישי","שבת"];
  var state = {};
  var container = document.getElementById("daysContainer");
  var weekStartInput = document.getElementById("weekStart");
  var submitBtn = document.getElementById("submitBtn");

  function formatDate(date) {
    return date.toLocaleDateString("he-IL", { year: "numeric", month: "2-digit", day: "2-digit" });
  }

  function getNextSunday() {
    var today = new Date();
    var dayOfWeek = today.getDay();
    var daysUntilSunday = (0 - dayOfWeek + 7) % 7;
    if (daysUntilSunday === 0) {
      daysUntilSunday = 7;
    }
    var nextSunday = new Date(today.getFullYear(), today.getMonth(), today.getDate() + daysUntilSunday);
    return nextSunday;
  }

  function getStartDate() {
    var startValue = weekStartInput.value;
    if (startValue) {
      var parts = startValue.split("-").map(Number);
      return new Date(parts[0], parts[1] - 1, parts[2]);
    }
    return getNextSunday();
  }

  function renderDays() {
    container.innerHTML = "";
    var startDate = getStartDate();

    days.forEach(function(day, index) {
      var currentDate = new Date(startDate.getFullYear(), startDate.getMonth(), startDate.getDate() + index);

      if (!state[day]) {
        state[day] = { morning: false, evening: false, note: "" };
      }

      var div = document.createElement("div");
      div.className = "day";

      var title = document.createElement("div");
      title.className = "day-title";
      title.textContent = day;

      var dateDiv = document.createElement("div");
      dateDiv.className = "day-date";
      dateDiv.textContent = formatDate(currentDate);

      var buttons = document.createElement("div");
      buttons.className = "buttons";

      var morningBtn = document.createElement("button");
      morningBtn.type = "button";
      morningBtn.className = "shift-btn morning-btn" + (state[day].morning ? " active-morning" : "");
      morningBtn.textContent = "☀️ בוקר";

      var eveningBtn = document.createElement("button");
      eveningBtn.type = "button";
      eveningBtn.className = "shift-btn evening-btn" + (state[day].evening ? " active-evening" : "");
      eveningBtn.textContent = "🌙 ערב";

      var textarea = document.createElement("textarea");
      textarea.placeholder = "הערות";
      textarea.value = state[day].note;

      (function(d) {
        morningBtn.addEventListener("click", function(e) {
          e.preventDefault();
          state[d].morning = !state[d].morning;
          morningBtn.className = "shift-btn morning-btn" + (state[d].morning ? " active-morning" : "");
        });

        eveningBtn.addEventListener("click", function(e) {
          e.preventDefault();
          state[d].evening = !state[d].evening;
          eveningBtn.className = "shift-btn evening-btn" + (state[d].evening ? " active-evening" : "");
        });

        textarea.addEventListener("input", function(e) {
          state[d].note = e.target.value;
        });
      })(day);

      buttons.appendChild(morningBtn);
      buttons.appendChild(eveningBtn);
      div.appendChild(title);
      div.appendChild(dateDiv);
      div.appendChild(buttons);
      div.appendChild(textarea);
      container.appendChild(div);
    });
  }

  weekStartInput.addEventListener("change", function() {
    state = {};
    renderDays();
  });

  submitBtn.addEventListener("click", function(e) {
    e.preventDefault();
    var nameInput = document.getElementById("employeeName").value.trim();
    if (!nameInput) {
      alert("אנא מלא את שם העובד");
      return;
    }
    var data = {
      employee: nameInput,
      weekStart: weekStartInput.value,
      availability: state
    };
    var result = document.getElementById("result");
    result.style.display = "block";
    result.textContent = JSON.stringify(data, null, 2);
    alert("הזמינות נשמרה בהצלחה!");
  });

  // Set next Sunday's date
  try {
    var nextSunday = getNextSunday();
    var y = nextSunday.getFullYear();
    var m = String(nextSunday.getMonth() + 1).padStart(2, '0');
    var d = String(nextSunday.getDate()).padStart(2, '0');
    weekStartInput.value = y + "-" + m + "-" + d;
  } catch(e) {}

  renderDays();
})();
</script>

</body>
</html>
